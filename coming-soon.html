<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Zahra Interior Architecture — new website arriving soon.">
  <meta name="robots" content="noindex">
  <title>Zahra — Coming Soon</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F7F2EA;
      --text: #2C2620;
      --text-light: #8C7D72;
      --accent: #B8956A;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 300;
      line-height: 1.7;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .splash {
      max-width: 540px;
      text-align: center;
      animation: rise 1.1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .splash__name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: clamp(3rem, 8vw, 5rem);
      letter-spacing: 0.06em;
      line-height: 1;
      margin: 0;
    }
    .splash__sub {
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--text-light);
      margin: 1.1rem 0 2.4rem;
    }
    .splash__divider {
      width: 32px;
      height: 1px;
      background: var(--accent);
      border: 0;
      margin: 0 auto 2.4rem;
    }
    .splash__headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.35rem, 3vw, 1.7rem);
      line-height: 1.45;
      color: var(--text);
      margin: 0 0 2.2rem;
    }
    .splash__contact {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-light);
      margin: 0;
    }
    .splash__contact a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 1px;
      transition: color 0.25s ease;
    }
    .splash__contact a:hover { color: var(--accent); }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .splash { animation: none; }
    }
  </style>
</head>
<body>
  <main class="splash" role="main">
    <h1 class="splash__name">Zahra</h1>
    <p class="splash__sub">Interior Architecture</p>
    <hr class="splash__divider" aria-hidden="true">
    <p class="splash__headline">A new website is being prepared.</p>
    <p class="splash__contact">
      Enquiries — <a href="mailto:hello@zahrastudio.com">hello@zahrastudio.com</a>
    </p>
  </main>
</body>
</html>
